volumes:
  jellyfin_data: {}
  radarr_data: {}
  sonarr_data: {}
  bazarr_data: {}
  prowlarr_data: {}
  deluge_data: {}
  gluetun_data: {}
  seerr_data: {}

services:
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    depends_on:
      - jellyfin
      - gluetun
      - seerr
    environment:
      - JELLYFIN_DOMAIN=${JELLYFIN_DOMAIN}
      - RADARR_DOMAIN=${RADARR_DOMAIN}
      - SONARR_DOMAIN=${SONARR_DOMAIN}
      - BAZARR_DOMAIN=${BAZARR_DOMAIN}
      - PROWLARR_DOMAIN=${PROWLARR_DOMAIN}
      - DELUGE_DOMAIN=${DELUGE_DOMAIN}
      - SEERR_DOMAIN=${SEERR_DOMAIN}
    volumes:
      - ./nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    ports:
      - 80:80
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - TZ=${TIMEZONE}
      - VPN_SERVICE_PROVIDER=mullvad
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${MULLVAD_WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${MULLVAD_WIREGUARD_ADDRESSES}
      - SERVER_COUNTRIES=${MULLVAD_SERVER_COUNTRIES}
      - FIREWALL_INPUT_PORTS=6767,7878,8112,8989,9696
    volumes:
      - gluetun_data:/gluetun
  jellyfin:
    image: linuxserver/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    environment:
      - TZ=${TIMEZONE}
      - PUID=${PUID}
      - PGID=${PGID}
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - jellyfin_data:/config
      - ${DATA_DIR}:/data
    ports:
      - 8096:8096
      - 8920:8920
      - 7359:7359/udp
      - 1900:1900/udp
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    init: true
    restart: unless-stopped
    depends_on:
      - jellyfin
      - gluetun
    environment:
      - TZ=${TIMEZONE}
      - PORT=5055
    volumes:
      - seerr_data:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/settings/public || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
  radarr:
    image: linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      - gluetun
    environment:
      - TZ=${TIMEZONE}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - radarr_data:/config
      - ${DATA_DIR}:/data
  sonarr:
    image: linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      - gluetun
    environment:
      - TZ=${TIMEZONE}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - sonarr_data:/config
      - ${DATA_DIR}:/data
  bazarr:
    image: linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      - gluetun
    environment:
      - TZ=${TIMEZONE}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - bazarr_data:/config
      - ${DATA_DIR}:/data
  prowlarr:
    image: linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      - gluetun
    environment:
      - TZ=${TIMEZONE}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - prowlarr_data:/config
  deluge:
    image: linuxserver/deluge:latest
    container_name: deluge
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      - gluetun
    environment:
      - TZ=${TIMEZONE}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - deluge_data:/config
      - ${DATA_DIR}:/data
